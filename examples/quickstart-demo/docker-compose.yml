services:

  nocodb:
    image: nocodb/nocodb-ee:latest
    env_file: docker.env
    deploy:
      mode: replicated
      replicas: 1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./nocodb:/usr/app/data
    networks:
      - nocodb-network
    ports:
      - '8080:8080'

  worker:
    image: nocodb/nocodb-ee:latest
    env_file: docker.env
    environment:
      NC_WORKER_CONTAINER: 'true'
    depends_on:
      - nocodb
    restart: unless-stopped
    volumes:
      - ./nocodb:/usr/app/data
    networks:
      - nocodb-network

  db:
    image: postgres:16.6
    environment:
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: CHANGE_ME_generated_password
      POSTGRES_DB: nocodb
    volumes:
      - ./postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nocodb -d nocodb']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocodb-network

  redis:
    image: redis:7
    volumes:
      - ./redis:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocodb-network

networks:
  nocodb-network:
    driver: bridge

services:

  nocodb:
    image: nocodb/nocodb-ee:latest
    env_file: docker.env
    deploy:
      mode: replicated
      replicas: 1
    restart: unless-stopped
    volumes:
      - ./nocodb:/usr/app/data
    networks:
      - nocodb-network
    ports:
      - '8080:8080'

  worker:
    image: nocodb/nocodb-ee:latest
    env_file: docker.env
    environment:
      NC_WORKER_CONTAINER: 'true'
    depends_on:
      - nocodb
    restart: unless-stopped
    volumes:
      - ./nocodb:/usr/app/data
    networks:
      - nocodb-network

networks:
  nocodb-network:
    driver: bridge
